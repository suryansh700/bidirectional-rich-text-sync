<!DOCTYPE html>
<html>

<head>

<style>

body{
font-family:'Segoe UI',sans-serif;
padding:15px;
background:#f8fafc;
}

.toolbar{
display:flex;
gap:10px;
margin-bottom:15px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

button.active{
background:#16a34a;
}

#editor{
height:320px;
background:white;
border:2px solid #cbd5e1;
border-radius:12px;
padding:15px;
overflow:auto;
font-size:16px;
}

</style>

</head>

<body>

<div class="toolbar">

<button id="boldBtn">
B
</button>

<button id="italicBtn">
I
</button>

<button id="strikeBtn">
S
</button>

</div>

<div
id="editor"
contenteditable="true">

Start typing here...

</div>

<script src="frameB.js"></script>

</body>

</html>
